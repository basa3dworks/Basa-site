<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Minha Conta | Basa 3D Works</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/#produtos">
        <span class="brand-mark">B3D</span>
        <span>Basa 3D Works</span>
      </a>
      <nav>
        <a href="/#produtos">Produtos</a>
        <a href="/conta.html">Minha conta</a>
        <a href="/admin.html">Admin</a>
      </nav>
    </header>

    <main class="account-page">
      <section class="account-hero">
        <p class="eyebrow">Conta do cliente</p>
        <h1>Minha Basa</h1>
        <p>Acompanhe pedidos, favoritos e orçamentos sob medida em um lugar só.</p>
      </section>

      <section class="account-shell">
        <aside class="account-sidebar" aria-label="Menu da conta">
          <button class="active" type="button" data-account-view="login">Entrar</button>
          <button type="button" data-account-view="register">Criar conta</button>
          <button type="button" data-account-view="profile">Minha conta</button>
          <button type="button" data-account-view="orders">Meus pedidos</button>
          <button type="button" data-account-view="favorites">Favoritos</button>
          <button type="button" data-account-view="quotes">Orçamentos</button>
        </aside>

        <div class="account-content">
          <section class="account-view active" data-account-panel="login">
            <div class="panel-head">
              <div>
                <p class="eyebrow">Acesso</p>
                <h2>Entrar</h2>
              </div>
            </div>
            <form id="loginForm" class="stack-form account-form">
              <label>Email<input name="email" type="email" required autocomplete="email"></label>
              <label>Senha<input name="customerPassword" type="password" required minlength="6" autocomplete="current-password"></label>
              <button class="primary-button" type="submit">Entrar</button>
              <p class="form-status" id="loginStatus"></p>
            </form>
          </section>

          <section class="account-view" data-account-panel="register" hidden>
            <div class="panel-head">
              <div>
                <p class="eyebrow">Cadastro</p>
                <h2>Criar conta</h2>
              </div>
            </div>
            <form id="registerForm" class="stack-form account-form">
              <label>Nome<input name="name" required autocomplete="name"></label>
              <label>Nome de usuário<input name="customerUsername" required autocomplete="username" placeholder="Ex: basa_cliente"></label>
              <label>Email<input name="email" type="email" required autocomplete="email"></label>
              <label>Senha<input name="customerPassword" type="password" required minlength="6" autocomplete="new-password"></label>
              <label>CPF ou CNPJ<input name="document" required inputmode="numeric" autocomplete="off"></label>
              <label>Telefone<input name="phone" required autocomplete="tel"></label>
              <div class="checkout-grid">
                <label>CEP<input name="zipCode" required inputmode="numeric" autocomplete="postal-code"></label>
                <label>Número<input name="number" required autocomplete="address-line2"></label>
              </div>
              <label>Rua<input name="street" required autocomplete="address-line1"></label>
              <div class="checkout-grid">
                <label>Bairro<input name="neighborhood" required></label>
                <label>Complemento<input name="complement" autocomplete="address-line3"></label>
              </div>
              <div class="checkout-grid">
                <label>Cidade<input name="city" required autocomplete="address-level2"></label>
                <label>Estado<input name="state" required maxlength="2" autocomplete="address-level1"></label>
              </div>
              <button class="primary-button" type="submit">Criar conta</button>
              <p class="form-status" id="registerStatus"></p>
            </form>
          </section>

          <section class="account-view" data-account-panel="profile" hidden>
            <div class="panel-head">
              <div>
                <p class="eyebrow">Dados</p>
                <h2>Minha conta</h2>
              </div>
              <button class="ghost-button" id="logoutAccountButton" type="button">Sair</button>
            </div>
            <div class="account-summary" id="accountSummary"></div>
          </section>

          <section class="account-view" data-account-panel="orders" hidden>
            <div class="panel-head">
              <div>
                <p class="eyebrow">Compras</p>
                <h2>Meus pedidos</h2>
              </div>
            </div>
            <div class="account-list" id="accountOrders"></div>
          </section>

          <section class="account-view" data-account-panel="favorites" hidden>
            <div class="panel-head">
              <div>
                <p class="eyebrow">Lista salva</p>
                <h2>Favoritos</h2>
              </div>
            </div>
            <div class="account-product-grid" id="accountFavorites"></div>
          </section>

          <section class="account-view" data-account-panel="quotes" hidden>
            <div class="panel-head">
              <div>
                <p class="eyebrow">Sob medida</p>
                <h2>Orçamentos</h2>
              </div>
            </div>
            <form id="accountQuoteForm" class="stack-form account-form" enctype="multipart/form-data">
              <label>Título<input name="title" required placeholder="Ex: Suporte personalizado"></label>
              <label>Sua ideia<textarea name="idea" rows="5" required placeholder="Conte medidas, uso, cor desejada, referências e quantidade."></textarea></label>
              <label>Imagem de referência<input name="referenceImage" type="file" accept="image/*"></label>
              <label>Orçamento desejado<input name="budget" placeholder="Ex: até R$ 150"></label>
              <label>Prazo desejado<input name="deadline" placeholder="Ex: preciso em 15 dias"></label>
              <button class="primary-button" type="submit">Enviar orçamento</button>
              <p class="form-status" id="accountQuoteStatus"></p>
            </form>
            <div class="account-list" id="accountQuotes"></div>
          </section>
        </div>
      </section>
    </main>

    <script src="/conta.js" type="module"></script>
  </body>
</html>
